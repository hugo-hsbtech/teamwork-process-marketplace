# Single source of truth for Codex agent model tiers.
#
# Codex has no model aliases (unlike Claude's opus/sonnet/haiku, which auto-track
# the latest version). Each agent toml must carry a literal, pinned model id, and
# agents can't reference a config profile. So this file is the one place the tiers
# are defined; `apply-model-tiers.py` stamps the `model` and `model_reasoning_effort`
# lines into every codex/agents/*.toml from here.
#
# To roll a tier onto a newer model (or when an id is retired), edit it HERE and run:
#     python3 codex/apply-model-tiers.py
# To move an agent between tiers, change its value under [agents] and re-run.
#
# Tiers mirror the Claude side one-to-one (agents/*.md `model:`).

[tiers.high]    # deep reasoning / judgment / open-ended generation / gates  — Claude: opus
model            = "gpt-5.5"
reasoning_effort = "high"

[tiers.medium]  # structured writing / rendering bounded by committed inputs — Claude: sonnet
model            = "gpt-5.3-codex"
reasoning_effort = "medium"

[tiers.low]     # deterministic I/O / assembly / numeric aggregation         — Claude: haiku
model            = "gpt-5.4-mini"
reasoning_effort = "low"

# agent -> tier. (hsb-triage-assessor has a Claude agent but no Codex toml yet;
# list it here so the assignment is recorded — the script skips it until the toml exists.)
[agents]
hsb-adr-proposer        = "high"
hsb-confidence-auditor  = "high"
hsb-effort-estimator    = "high"
hsb-evidence-extractor  = "high"
hsb-feasibility-assessor = "high"
hsb-question-strategist = "high"
hsb-reconciler          = "high"
hsb-section-drafter     = "high"
hsb-synthesizer         = "high"
hsb-tech-classifier     = "high"
hsb-triage-assessor     = "high"

hsb-citation-resolver   = "medium"
