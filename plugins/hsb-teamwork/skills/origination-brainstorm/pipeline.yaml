# Declarative dependency graph for the origination-brainstorm pipeline.
# Source of truth for ordering + conflict-safety. Validated by tools/pipeline_graph.py.
# See ../tech-assessment/references/scheduling.md for the model (edge kinds, invariants).
#
# NOTE ON LOOPS: the capture phase is a LOOP the orchestrator repeats; this graph is the
# single-pass dependency skeleton (no back-edges drawn). Re-running a batch is the
# orchestrator's job, not a cycle in the data.

version: 1
skill: origination-brainstorm

external_inputs:
  - template      # the origination-record target template
  - statement     # the Submitter's opening description
  - file-refs     # any referenced input files (optional)

# Bundled content datums (kept coarse — this skill captures rather than drafts sections).
section_datums:
  - capture-content   # the recorded answers that fill the capture sections
  - derived-content   # executive summary, triage draft (composed from capture-content)

file_writers:
  contract.lock.md: hsb-template-analyst
  sources/: hsb-source-indexer
  sources-index.md: hsb-source-indexer
  qa-log.md: hsb-ledger-writer
  target-document.md: hsb-doc-updater
  glossary.md: hsb-glossary-keeper
  decisions.md: hsb-decisions-keeper
  readiness-report.md: hsb-gap-reporter
  output/humanized.md: hsb-humanizer
  output/enrichment-plan.md: hsb-enrichment-analyst
  output/enriched.md: hsb-visual-enricher
  output/translated.md: hsb-translator
  final/: hsb-finalizer
  output/manifest.md: hsb-packager

nodes:

  # ---- Setup -------------------------------------------------------------------
  hsb-template-validator:
    phase: setup
    reads: [template]
    decides: [template-valid]
  hsb-template-analyst:
    phase: setup
    reads: [template, template-valid]
    decides: [contract]
    persists: contract.lock.md
  hsb-source-indexer:
    phase: setup
    reads: [file-refs]
    decides: [sources]
    persists: [sources/, sources-index.md]

  # ---- Capture loop (orchestrator repeats these batches) -----------------------
  hsb-question-strategist:
    phase: capture
    reads: [contract]
    decides: [questions]
  hsb-evidence-extractor:
    phase: capture
    reads: [contract, sources]
    decides: [evidence]
  hsb-reconciler:
    phase: capture
    reads: [contract, sources, qa-log]
    decides: [conflict-resolution]   # routed to the ledger by the orchestrator
  hsb-ledger-writer:
    phase: capture
    reads: [contract, questions, evidence]
    decides: [qa-log, capture-content]   # records the answers that ARE the capture content
    persists: qa-log.md
  hsb-synthesizer:
    phase: capture
    reads: [capture-content]
    decides: [derived-content]
  hsb-doc-updater:
    phase: capture
    reads: [contract, capture-content, derived-content]
    decides: [target-document]
    persists: target-document.md
  hsb-confidence-auditor:
    phase: capture
    reads: [contract, capture-content, derived-content]
    decides: [readiness-verdict]
  hsb-integrity-checker:
    phase: capture
    reads: [target-document]
    decides: [integrity-verdict]
  hsb-glossary-keeper:
    phase: capture
    reads: [qa-log, target-document]
    decides: [glossary]
    persists: glossary.md
  hsb-decisions-keeper:
    phase: capture
    reads: [qa-log, target-document]
    decides: [decisions]
    persists: decisions.md
  hsb-gap-reporter:
    phase: capture
    reads: [readiness-verdict]
    decides: [readiness-report]
    persists: readiness-report.md

  # ---- Production & wrap -------------------------------------------------------
  hsb-humanizer:
    phase: production
    reads: [target-document, glossary]
    decides: [humanized]
    persists: output/humanized.md
  hsb-language-auditor:
    phase: production
    reads: [humanized]
    decides: [language-verdict]
  hsb-enrichment-analyst:
    phase: production
    reads: [target-document, qa-log, sources]
    decides: [enrichment-plan]
    persists: output/enrichment-plan.md
  hsb-visual-enricher:
    phase: production
    reads: [humanized, enrichment-plan]
    decides: [enriched]
    persists: output/enriched.md
  hsb-citation-resolver:
    phase: production
    reads: [qa-log, sources, target-document]
    decides: [citation-map]
  hsb-translator:
    phase: production
    reads: [humanized]
    decides: [translated]
    persists: output/translated.md
  hsb-finalizer:
    phase: production
    reads: [enriched, citation-map]
    decides: [final]
    persists: final/
  hsb-packager:
    phase: production
    reads: [final, humanized, translated, readiness-verdict]
    decides: [manifest]
    persists: output/manifest.md

# No provisional edges in this skill (no draft-before-a-decision proposers).
reconciliations: []
